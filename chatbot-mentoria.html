<iframe
  id="mia-frame"
  src="https://luizdecaxtro.github.io/mentoria-cadalunos/chatbot-mentoria.html"
  style="position:fixed;bottom:0;right:0;width:100px;height:100px;border:none;z-index:99999;background:transparent;pointer-events:none;transition:all .3s ease;"
  allow="clipboard-write"
  scrolling="no"
  title="Assistente MIA"
></iframe>
<script>
var miaF = document.getElementById('mia-frame');
miaF.onload = function(){
  this.style.pointerEvents = 'auto';
  // Expande quando clicado
  this.contentWindow.addEventListener && 
  window.addEventListener('message', function(e){
    if(e.data === 'mia-open') { miaF.style.width='420px'; miaF.style.height='100vh'; }
    if(e.data === 'mia-close') { miaF.style.width='100px'; miaF.style.height='100px'; }
  });
};
</script>
